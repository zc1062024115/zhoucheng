<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 页面标题，会显示在浏览器标签 -->
    <title>我的个人首页</title>
    <!-- 简单的样式，让页面不那么丑 -->
    <style>
        body {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            font-family: 微软雅黑, sans-serif;
            background-color: #f5f5f5;
        }
        .header {
            text-align: center;
            padding: 30px 0;
        }
        .content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>你好，我是XXX</h1>
        <p>这是我的第一个GitHub Pages页面 🚀</p>
    </div>
    <div class="content">
        <h2>关于我</h2>
        <p>可以在这里写你的简介、技能、联系方式...</p>
        <h2>联系方式</h2>
        <p>邮箱：your@email.com</p>
        <p>GitHub：https://github.com/你的用户名</p>
    </div>
</body>
</html>
